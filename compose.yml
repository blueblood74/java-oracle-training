services:

  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free

    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD}

    ports:
      - "1521:1521"

    volumes:
      - oracle-data:/opt/oracle/oradata

    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10

  java:
    build:
      context: ./java

    container_name: java-training

    tty: true

    working_dir: /app

    volumes:
      - ./java:/app

    depends_on:
      oracle:
        condition: service_started

volumes:
  oracle-data:
